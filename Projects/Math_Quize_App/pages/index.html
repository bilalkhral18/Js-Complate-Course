<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="../assets/favicon.ico"
      type="image/x-icon"
    />
    <title>Math Question Game | Do Some Coding</title>
    <link rel="stylesheet" href="../css/index.css" />
    <script
      src="https://kit.fontawesome.com/17c7ca7c0b.js"
      crossorigin="anonymous"
    ></script>
    <script src="../js/index.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <main class="content">
        <div class="content-container">
          <div class="score">
            <h2>
              Score <i class="fa-solid fa-arrow-right"></i
              ><span id="count">0</span>
            </h2>
            <div class="calculation">
              <h1 class="Q-heading" id="random_question">
                Q. What is 9 multiply by 6
              </h1>
              <form action="#" onsubmit="answerForm(event)" id="formValues">
                <input type="number" id="userAnswer" name="userAnswer" />
                <button type="submit">Submit</button>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
